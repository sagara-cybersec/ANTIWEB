<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        }
       body{
        background: #090e1a;
        height: 100vh;
        font-family: 'DM Sans', sans-serif;
        justify-content: center;
        align-items: center;
        display: flex;
       } 
       body::before{
        content: "";
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(37,99,235,.25), transparent 70%);
        filter: blur(50px);
        animation: float 6s ease-in-out infinite;
       }
       .border {
        position: relative;
        background: #151d2e;
        backdrop-filter: blur(10px);
        border-color: #152546;
        border: 1px solid rgba(59,130,246,.2);
        width: 350px;
        max-width: 400px;
        padding: 35px;
        border-radius: 20px;
        box-shadow: 0 0 25px rgba(37,99,235,.15),
        inset 0 0 10px rgba(255,255,255,.03);
        color: #e2e8f0;
       }
       @keyframes float{
        0%{
            transform:translateY(0px);
        }
        50%{
            transform: translateY(-20px);
        }
        100%{
            transform: translateY(0px);
        }
       }
       .border h2 {
        text-align: center;
        color: #3b82f6;
        margin-bottom:30px;
        font-size: 35px;
       }
       .input-login {
        margin-bottom: 20px;
       }
       .input-login label{
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #94a3b8;
       }
       .input-login input {
        width: 100%;
        border: none;
        outline: none;
        padding: 14px;
        border: 1px solid #292354;
        border-radius: 10px;
        background: #0f172a;
        color:white;
        transition: .3s;
       }
       .input-login input:focus{
        border-color: #3b82f6;
        box-shadow: 0 0 10px rgba(59,130,246,.4);
       }
       button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #2563eb, #1d4ed8);
        color: white;
        font-size: 16px;
        font-weight: 600;
        transition: .3s;
        cursor: pointer;
       }
       button:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 20px rgba(59,130,246,.5);
       }

    </style>
</head>
<body>
    <div class="border">
    <form>
        <h2>Login</h2>
        <div class="input-login">
            <label>Username :</label>
            <input type="text" name="Username" placeholder="Username..." required>
        </div>
        <div class="input-login">
            <label>Password :</label>
            <input type="password" name="pass" placeholder="Password..." required>
        </div>
        <div class="btn-submit">
        <button type="submit">Submit</button>
        </div>
    </form>
    <script>
        
const form = document.querySelector("form");

form.addEventListener("submit", function(e){
    e.preventDefault();

    const username = document.querySelector('input[name="Username"]').value;
    const password = document.querySelector('input[name="pass"]').value;

    if(username === "admin" && password === "123"){
        window.location.href = "./landing.html";
    } else {
        alert("Username atau password salah!");
    }
});
    </script>
</body>
</html>
